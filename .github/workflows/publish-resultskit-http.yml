name: Publish ResultsKit.Http

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-resultskit-http.yml'
      - 'src/ResultsKit/**'
      - 'src/ResultsKit.Http/**'
      - 'test/ResultsKit.Http.Tests/**'
      - 'README.md'

permissions:
  contents: read
  id-token: write

jobs:
  build-pack-publish:
    runs-on: ubuntu-latest

    env:
      DOTNET_VERSION: '10.0.x'
      VERSION_PREFIX: '1.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Calculate package version
        id: version
        shell: pwsh
        run: |
          $patch = [int]${{ github.run_number }} - 1
          $version = "$env:VERSION_PREFIX.$patch"
          "package_version=$version" >> $env:GITHUB_OUTPUT
          "Using package version $version"

      - name: Restore
        run: dotnet restore src/ResultsKit.Http/ResultsKit.Http.csproj

      - name: Test
        run: dotnet test test/ResultsKit.Http.Tests/ResultsKit.Http.Tests.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/ResultsKit.Http/ResultsKit.Http.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.package_version }} -o ./artifacts/resultskit-http

      - name: NuGet login via trusted publishing
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Push package to NuGet
        run: |
          dotnet nuget push "./artifacts/resultskit-http/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate

      - name: Push symbols to NuGet
        run: |
          dotnet nuget push "./artifacts/resultskit-http/*.snupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
